<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WildVF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Звёздное небо */
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .shooting-star {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, white, transparent);
            animation: shoot linear infinite;
            opacity: 0;
        }

        @keyframes shoot {
            0% {
                transform: translateX(0) translateY(0) rotate(-45deg);
                opacity: 1;
            }
            100% {
                transform: translateX(300px) translateY(300px) rotate(-45deg);
                opacity: 0;
            }
        }

        /* Луна */
        .moon {
            position: absolute;
            right: 5%;
            top: 10%;
            width: 120px;
            height: 120px;
            z-index: 2;
            animation: moonRotate 20s linear infinite;
        }

        .moon-body {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ffffff 0%, #f0f0f0 40%, #d0d0d0 100%);
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.3), 
                        0 0 120px rgba(255, 255, 255, 0.1),
                        inset -20px -20px 40px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .crater {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(200, 200, 200, 0.8), rgba(150, 150, 150, 0.4));
            box-shadow: inset 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .crater-1 { width: 20px; height: 20px; top: 25%; left: 30%; }
        .crater-2 { width: 15px; height: 15px; top: 45%; left: 55%; }
        .crater-3 { width: 12px; height: 12px; top: 60%; left: 25%; }
        .crater-4 { width: 18px; height: 18px; top: 35%; left: 65%; }
        .crater-5 { width: 10px; height: 10px; top: 70%; left: 50%; }

        @keyframes moonRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== МАЛЕНЬКАЯ ВОЛНА (замена шариков) ===== */
        .wave-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            height: 40px;
        }

        .wave-bar {
            width: 6px;
            height: 100%;
            border-radius: 10px;
            margin: 0 3px;
            animation: waveFlow 1.2s ease-in-out infinite;
            /* Переливающийся градиент */
            background: linear-gradient(180deg, 
                #0088cc 0%, 
                #a855f7 25%, 
                #ec4899 50%, 
                #ffcc00 75%, 
                #00ff66 100%);
            background-size: 100% 300%;
            animation: waveFlow 1.2s ease-in-out infinite, waveGradient 2s linear infinite;
            box-shadow: 0 0 10px rgba(0, 136, 204, 0.5);
        }

        .wave-bar:nth-child(1) { animation-delay: 0s; height: 15px; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 25px; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; height: 35px; }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; height: 25px; }
        .wave-bar:nth-child(5) { animation-delay: 0.4s; height: 15px; }
        .wave-bar:nth-child(6) { animation-delay: 0.5s; height: 20px; }
        .wave-bar:nth-child(7) { animation-delay: 0.6s; height: 30px; }
        .wave-bar:nth-child(8) { animation-delay: 0.7s; height: 20px; }
        .wave-bar:nth-child(9) { animation-delay: 0.8s; height: 15px; }
        .wave-bar:nth-child(10) { animation-delay: 0.9s; height: 25px; }
        .wave-bar:nth-child(11) { animation-delay: 1.0s; height: 35px; }
        .wave-bar:nth-child(12) { animation-delay: 1.1s; height: 25px; }
        .wave-bar:nth-child(13) { animation-delay: 1.2s; height: 15px; }

        @keyframes waveFlow {
            0%, 100% { 
                transform: scaleY(0.3); 
                opacity: 0.6;
            }
            50% { 
                transform: scaleY(1); 
                opacity: 1;
                box-shadow: 0 0 20px rgba(168, 85, 247, 0.8), 0 0 40px rgba(236, 72, 153, 0.5);
            }
        }

        @keyframes waveGradient {
            0% { background-position: 0% 0%; }
            50% { background-position: 0% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* ===== Градиентный текст ===== */
        .title {
            font-size: 2.5em;
            font-weight: 900;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #0088cc, #a855f7, #ec4899, #0088cc);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: slideDown 0.8s ease-out, gradientShift 3s linear infinite, glow 2s ease-in-out infinite alternate;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(0, 136, 204, 0.8)); }
            to { filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.8)) drop-shadow(0 0 40px rgba(236, 72, 153, 0.6)); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Статус онлайн */
        .status {
            color: #00ff66;
            font-size: 1em;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff66;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ===== Кнопки с 3D и Gradient Borders ===== */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s ease-out both;
            border: none;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .btn:nth-child(1) { animation-delay: 0.6s; }
        .btn:nth-child(2) { animation-delay: 0.8s; }
        .btn:nth-child(3) { animation-delay: 1.0s; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: #0088cc;
            color: white;
            position: relative;
            z-index: 1;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 17px;
            background: linear-gradient(45deg, #0088cc, #a855f7, #ec4899, #0088cc);
            background-size: 300% 300%;
            z-index: -1;
            animation: borderGradient 3s ease infinite;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-primary:hover::after {
            opacity: 1;
        }

        .btn-primary:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 136, 204, 0.4), 0 0 20px rgba(168, 85, 247, 0.3);
        }

        .btn-outline {
            background: transparent;
            color: #0088cc;
            position: relative;
            z-index: 1;
        }

        .btn-outline::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 17px;
            background: linear-gradient(45deg, #0088cc, #00ff66, #ffcc00, #0088cc);
            background-size: 300% 300%;
            z-index: -1;
            animation: borderGradient 3s ease infinite;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .btn-outline:hover::after {
            opacity: 1;
            animation: borderGradient 1s ease infinite;
        }

        .btn-outline:hover {
            background: rgba(0, 136, 204, 0.1);
            color: white;
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 136, 204, 0.2);
        }

        @keyframes borderGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btn:active {
            transform: scale(0.98);
        }

        .icon {
            font-size: 1.3em;
        }

        /* Парящие частицы */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }

        @media (max-width: 768px) {
            .moon { width: 90px; height: 90px; right: 3%; }
            .title { font-size: 2em; }
            .btn { font-size: 1em; padding: 15px; }
        }

        @media (max-width: 480px) {
            .moon { width: 70px; height: 70px; right: 2%; top: 5%; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- Звёздное небо -->
    <div class="stars-bg" id="starsBg">
        <div class="moon">
            <div class="moon-body">
                <div class="crater crater-1"></div>
                <div class="crater crater-2"></div>
                <div class="crater crater-3"></div>
                <div class="crater crater-4"></div>
                <div class="crater crater-5"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- ===== МАЛЕНЬКАЯ ВОЛНА (замена шариков) ===== -->
        <div class="wave-container">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>

        <h1 class="title">WildVF</h1>

        <div class="status">
            <span class="status-dot"></span>
            <span>Online</span>
        </div>

        <a href="https://t.me/@vansFenix" class="btn btn-primary" target="_blank">
            <span class="icon">📱</span>
            TELEGRAM
        </a>

        <a href="https://t.me/biovansFenix" class="btn btn-outline" target="_blank">
            <span class="icon">👥</span>
            ТГ КАНАЛ
        </a>

        <a href="https://t.me/wildVF" class="btn btn-outline" target="_blank">
            <span class="icon">🛡️</span>
            ЛУЧШИЙ ВПН
        </a>
    </div>

    <script>
        const starsBg = document.getElementById('starsBg');

        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';

            const size = 1 + Math.random() * 3;
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const duration = 2 + Math.random() * 4;
            const delay = Math.random() * 5;

            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = x + '%';
            star.style.top = y + '%';
            star.style.animationDuration = duration + 's';
            star.style.animationDelay = delay + 's';

            if (Math.random() > 0.7) {
                star.style.background = '#b0c4de';
                star.style.boxShadow = `0 0 ${size * 2}px #b0c4de`;
            } else {
                star.style.boxShadow = `0 0 ${size * 2}px white`;
            }

            starsBg.appendChild(star);
        }

        function createShootingStar() {
            const shootingStar = document.createElement('div');
            shootingStar.className = 'shooting-star';

            const x = Math.random() * 80;
            const y = Math.random() * 50;
            const duration = 1 + Math.random() * 2;

            shootingStar.style.left = x + '%';
            shootingStar.style.top = y + '%';
            shootingStar.style.animationDuration = duration + 's';

            starsBg.appendChild(shootingStar);

            setTimeout(() => {
                shootingStar.remove();
            }, duration * 1000);
        }

        setInterval(() => {
            if (Math.random() > 0.5) {
                createShootingStar();
            }
        }, 3000);

        // 3D наклон кнопок при наведении
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (y - centerY) / 10;
                const rotateY = (centerX - x) / 10;
                btn.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05) translateY(-3px)`;
            });

            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1) translateY(0)';
            });
        });

        // Парящие частицы
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = 2 + Math.random() * 4;
            const x = Math.random() * 100;
            const duration = 10 + Math.random() * 20;
            const colors = ['#0088cc', '#a855f7', '#ec4899', '#00ff66', '#ffcc00'];
            const color = colors[Math.floor(Math.random() * colors.length)];

            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = x + '%';
            particle.style.background = color;
            particle.style.boxShadow = `0 0 ${size * 2}px ${color}`;
            particle.style.animationDuration = duration + 's';

            starsBg.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, duration * 1000);
        }

        setInterval(createParticle, 500);
    </script>
</body>
</html>
